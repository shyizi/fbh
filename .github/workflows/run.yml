name: 每周抓取发布会并推送墨水屏

on:
  schedule:
    - cron: "0 2 * * 1"  # 每周一 10:00 运行 (北京时间)
  workflow_dispatch:     # 允许你手动点击运行

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: python -m pip install -r requirements.txt

      - name: 运行程序
        env:
          ZECTRIX_API_KEY: ${{ secrets.ZECTRIX_API_KEY }}
          DEVICE_ID: ${{ secrets.DEVICE_ID }}
        run: python main.py
